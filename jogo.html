<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Game</title>

<style>
body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
border:3px solid white;
image-rendering: pixelated;
}
</style>

</head>
<body>

<canvas id="game" width="640" height="360"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

/* IMAGENS */

// FUNDO
const bgFase1 = new Image()
bgFase1.src = "background(1).jpg"

const bgFase2 = new Image()
bgFase2.src = "background(2).png"

// CHÃO
const groundFase1 = new Image()
groundFase1.src = "ground(1).jpg"

const groundFase2 = new Image()
groundFase2.src = "ground(2).jpg"

// PLATAFORMA (opcional mas recomendado)
const platformFase1 = new Image()
platformFase1.src = "plataforma(1).jpg"

const platformFase2 = new Image()
platformFase2.src = "plataforma(2).jpg"

const playerImg = new Image()
playerImg.src = "player.png"

const doorImg = new Image()
doorImg.src = "portal.png"

const jumpImg = new Image()
jumpImg.src = "pular.png"

const enemyImg = new Image()
enemyImg.src = "enemy.png"

const enemyDeadImg = new Image()
enemyDeadImg.src = "enemy_dead.png"

const spikeImg = new Image()
spikeImg.src = "spike.png"

let faseAtual = 1;

let chaoFase1 = [
  {x:0, y:288, w:250, h:72},
  {x:1800, y:288, w:100, h:72},
  {x:1980, y:288, w:1320, h:72}
]

let plataformasFase1 = [
  {x:300, y:230, w:100, h:20},
  {x:490, y:220, w:140, h:20},
  {x:700, y:180, w:100, h:20},
  {x:890, y:240, w:140, h:20},
  {x:1100, y:210, w:120, h:20},
  {x:1300, y:180, w:300, h:20},
  {x:1650, y:150, w:90, h:20},
]

let fakeGround = [
  {x:1900, y:288, w:80, h:72}
]

let portaFase1 = {
  x:2800,
  y: 190,
  w: 90,
  h: 100
}

let chaoFase2 = [
  {x:300, y:216, w:350, h:50},
  {x:2600, y:216, w:900, h:50},
  {x:0, y:288, w:7000, h:72}
]

let plataformasFase2 = [
  {x:850, y:200, w:300, h:20},
  {x:1150, y:200, w:300, h:20},
  {x:1715, y:200, w:300, h:20},
  {x:2015, y:200, w:300, h:20}
]

let inimigos = [
  {x:2000, y:250, w:40, h:40, dir:1, minX:1625, maxX:2599, range:300},
  {x:1715, y:160, w:40, h:40, dir:-1, minX:1715, maxX:2315, range:2000},
  {x:2599, y:250, w:40, h:40, dir:-1, minX:700, maxX:1625, range:300}
]

let espinhos = [
  {x:648, y:288, w:70, h:70, altura:0, subindo:true, tempo:0},
  {x:2600, y:216, w:70, h:70, altura:0, subindo:false, tempo:0}
]
let gameState = "menu"
let chaoAtual = chaoFase1
let plataformasAtual = plataformasFase1
let bgAtual = bgFase1
let groundAtual = groundFase1
let platformAtual = platformFase1
/* PERSONAGEM */
 
const player = {
x:100,
y:240,
width:48,
height:48,
speed:3,
vy:0,
jump:0
}

let direction = 1

/* porta */



/* CAMERA */

let cameraX = 0


/* CONTROLES */

let movingRight = false
let movingLeft = false
let descendo = false;

window.addEventListener("keydown", e=>{
if(e.key==="ArrowRight") movingRight=true
if(e.key==="ArrowLeft") movingLeft=true

if(e.key===" " && player.jump==0){
player.vy = -10
player.jump = 1
}
})

window.addEventListener("keyup", e=>{
if(e.key==="ArrowRight") movingRight=false
if(e.key==="ArrowLeft") movingLeft=false
}) 

window.addEventListener("keydown", e=>{
  if(e.key === "ArrowDown") descendo = true;
})

window.addEventListener("keyup", e=>{
  if(e.key === "ArrowDown") descendo = false;
})

canvas.addEventListener("touchstart", e=>{

let agora = new Date().getTime()
let diferenca = agora - ultimoToque
ultimoToque = agora

let x = e.touches[0].clientX

if(x > window.innerWidth/2){
movingRight = true
}else{
movingLeft = true
}

if(diferenca < 300 && player.jump == 0){
player.vy = -10
player.jump = 1
}

})

let ultimoToque = 0

canvas.addEventListener("touchend", ()=>{

movingRight = false
movingLeft = false

})

let frame = 0
let frameTimer = 0
let frameDelay = 10

const frameWidth = 705
const frameHeight = 705
const totalFrames = 2

window.addEventListener("keydown", e=>{
  if(gameState === "menu" && e.key === "Enter"){
    gameState = "playing"
  }

  if(gameState === "gameover" && e.key === "Enter"){
    restartGame()
  }
})
/* UPDATE */

function update(){
  
  if(gameState !== "playing") return

  if(faseAtual == 1){
    chaoAtual = chaoFase1
    plataformasAtual = plataformasFase1
  }else{
    chaoAtual = chaoFase2
    plataformasAtual = plataformasFase2
  }
  let prevX = player.x;
  let prevY = player.y;
  
  if(movingRight){
    player.x += player.speed
    direction = 1
  }

  if(movingLeft){
    player.x -= player.speed
    direction = -1
  }
  // GRAVIDADE (UMA VEZ SÓ!)
  player.vy += 0.6
  player.y += player.vy

  let noChao = false
  
  // COLISÃO COM CHÃO
  for(let c of chaoAtual){

  if(
    player.x < c.x + c.w &&
    player.x + player.width > c.x &&
    player.y < c.y + c.h &&
    player.y + player.height > c.y
  ){

    // 👇 CAINDO EM CIMA
    if(prevY + player.height <= c.y){
      player.y = c.y - player.height
      player.vy = 0
      noChao = true
    }

    // 👇 BATENDO POR BAIXO
    else if(prevY >= c.y + c.h){
      player.y = c.y + c.h
      player.vy = 0
    }

    // 👇 BATENDO PELA ESQUERDA
    else if(prevX + player.width <= c.x){
      player.x = c.x - player.width
    }

    // 👇 BATENDO PELA DIREITA
    else if(prevX >= c.x + c.w){
      player.x = c.x + c.w
    }

  }

}

  // COLISÃO COM PLATAFORMAS
for(let p of plataformasAtual){
  if(
    !descendo && // 👈 ESSA LINHA É A MÁGICA
    player.x < p.x + p.w &&
    player.x + player.width > p.x &&
    player.y + player.height <= p.y + 10 &&
    player.y + player.height + player.vy >= p.y
    ){
      player.y = p.y - player.height
      player.vy = 0
      noChao = true
    }
  }
  

for(let i of inimigos){

  if(i.morto) continue // 👈 IGNORA inimigo morto

  if(
    player.x < i.x + i.w &&
    player.x + player.width > i.x &&
    player.y < i.y + i.h &&
    player.y + player.height > i.y
  ){

    if(player.vy > 0 && prevY + player.height <= i.y){
      i.morto = true
      player.vy = -8
    }else{
      gameState = "gameover"
      player.vy = 0
      
      for(let i of inimigos){
  i.morto = false
    }
    }
  }
}
for(let s of espinhos){

  if(s.altura <= 5) continue // espinho escondido

  if(
    player.x < s.x + s.w &&
    player.x + player.width > s.x &&
    player.y < s.y &&
    player.y + player.height > s.y - s.altura
  ){
    // MORRE
    gameState = "gameover"
    player.vy = 0

    for(let j of inimigos){
      j.morto = false
    }
  }
}
  // CONTROLE DE PULO
  if(noChao){
    player.jump = 0
  }else{
    player.jump = 1
  }

  
if(player.x > 2200 && faseAtual == 1){
  faseAtual = 2;

  // reset do jogador
  player.x = 50;
  player.y = 200;
  player.vy = 0;
}

  // CAMERA
  cameraX = player.x - 200
  player.x = Math.max(0, Math.min(3000, player.x))
  cameraX = Math.max(0, cameraX)

  // ANIMAÇÃO
  if(movingRight || movingLeft){
    frameTimer++
    if(frameTimer > frameDelay){
      frame++
      frameTimer = 0
      if(frame >= totalFrames){
        frame = 0
      }
    }
  }else{
    frame = 0
  }

  // QUEDA (buraco)
  if(player.y > canvas.height + 100){
    gameState = "gameover"
    player.vy = 0
  }

if(faseAtual == 2){
  for(let i of inimigos){
    if(i.morto) continue

    let distancia = player.x - i.x

    // 👀 SE O PLAYER ESTÁ PERTO → PERSEGUE
    if(Math.abs(distancia) < i.range){
      if(distancia > 0){
        i.x += 4  // vai pra direita
      }else{
        i.x -= 4   // vai pra esquerda
      }
    }
    // 👣 SE NÃO → PATRULHA NORMAL
    else{
      i.x += i.dir * 3

      if(i.x <= i.minX || i.x + i.w >= i.maxX){
        i.dir *= -1
      }
    }
    // 🧱 LIMITES (TRAVA FINAL)
if(i.x < i.minX){
  i.x = i.minX
}
if(i.x + i.w > i.maxX){
  i.x = i.maxX - i.w
}
  }
}

if(faseAtual == 2){
  for(let s of espinhos){

    s.tempo++

    if(s.tempo > 120){ // troca a cada 1 segundo
      s.subindo = !s.subindo
      s.tempo = 0
    }

    if(s.subindo){
      s.altura += 2
      if(s.altura > s.h) s.altura = s.h
    }else{
      s.altura -= 2
      if(s.altura < 0) s.altura = 0
    }

  }
}

if(faseAtual == 1){
  chaoAtual = chaoFase1
  plataformasAtual = plataformasFase1

  bgAtual = bgFase1
  groundAtual = groundFase1
  platformAtual = platformFase1

}else{
  chaoAtual = chaoFase2
  plataformasAtual = plataformasFase2

  bgAtual = bgFase2
  groundAtual = groundFase2
  platformAtual = platformFase2
}
}
/* DESENHO */

function draw(){
  
  // MENU
if(gameState === "menu"){
  ctx.fillStyle = "black"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  ctx.fillStyle = "white"
  ctx.font = "30px Arial"
  ctx.textAlign = "center"
ctx.textBaseline = "middle"
  ctx.fillText("Sem nome ainda", 220,150)

  ctx.font = "20px Arial"
  ctx.textAlign = "center"
ctx.textBaseline = "middle"
  ctx.fillText("Pressione ENTER para jogar", 180,200)

  return
}

if(gameState === "gameover"){
  ctx.fillStyle = "black"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  ctx.fillStyle = "red"
  ctx.font = "30px Arial"
  ctx.textAlign = "center"
ctx.textBaseline = "middle"
  ctx.fillText("GAME OVER", 220,150)

  ctx.fillStyle = "white"
  ctx.font = "20px Arial"
  ctx.textAlign = "center"
ctx.textBaseline = "middle"
  ctx.fillText("Pressione ENTER para tentar novamente", 130,200)

  return
}
  ctx.fillStyle = "#87CEEB"
  ctx.fillRect(0,0,canvas.width,canvas.height)

function restartGame(){
  gameState = "playing"
  faseAtual = 1

  player.x = 100
  player.y = 200
  player.vy = 0

  for(let i of inimigos){
    i.morto = false
  }
}
  /* BACKGROUND */
  if(bgAtual.complete){
    for(let i=0;i<10;i++){
      ctx.drawImage(
        bgAtual,
        i*640 - (cameraX * 0.3 % 640),
        0,
        640,
        360
      )
    }
  }

  /* CHÃO */
  
if(groundAtual.complete){

  for(let c of chaoAtual){

    let tiles = Math.ceil(c.w / groundAtual.width)

    for(let i = 0; i < tiles; i++){

      let x = c.x + i * groundAtual.width

      let largura = groundAtual.width

      // corta o último pedaço
      if(x + groundAtual.width > c.x + c.w){
        largura = (c.x + c.w) - x
      }

      ctx.drawImage(
        groundAtual,
        0, 0, largura, groundAtual.height, // RECORTE da imagem
        x - cameraX, c.y,
        largura, groundAtual.height
      )

    }
  }

for(let f of fakeGround){

  let tiles = Math.ceil(f.w / groundAtual.width)

  for(let i = 0; i < tiles; i++){

    let x = f.x + i * groundAtual.width

    let largura = groundAtual.width

    if(x + groundAtual.width > f.x + f.w){
      largura = (f.x + f.w) - x
    }

    ctx.drawImage(
      groundAtual,
      0, 0, largura, groundAtual.height,
      x - cameraX, f.y,
      largura, groundAtual.height
    )

  }
}

}

  /* PLATAFORMAS */
  
for(let p of plataformasAtual){
  ctx.drawImage(
    platformAtual,
    p.x - cameraX,
    p.y,
    p.w,
    p.h
  )
}

if(faseAtual == 1){
  ctx.drawImage(
    doorImg,
    portaFase1.x - cameraX,
    portaFase1.y,
    portaFase1.w,
    portaFase1.h
  )
}

  /* PLAYER */
  ctx.save()
  ctx.scale(direction, 1)

  let img = player.jump == 1 ? jumpImg : playerImg
  let sx = player.jump == 1 ? 0 : frame * frameWidth

  ctx.drawImage(
    img,
    sx,
    0,
    frameWidth,
    frameHeight,
    direction === 1
      ? player.x - cameraX
      : -(player.x - cameraX + player.width),
    player.y,
    player.width,
    player.height
  )

  ctx.restore()

// INIMIGOS
if(faseAtual == 2){
  for(let i of inimigos){

    let img = i.morto ? enemyDeadImg : enemyImg

    ctx.drawImage(
      img,
      i.x - cameraX,
      i.y,
      i.w,
      i.h
    )
  }
}
if(faseAtual == 2){
  for(let s of espinhos){

    if(s.altura <= 0) continue

    ctx.drawImage(
      spikeImg,
      s.x - cameraX,
      s.y - s.altura,
      s.w,
      s.altura
    )
  }
}
}

/* GAME LOOP */

function gameLoop(){

update()
draw()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
